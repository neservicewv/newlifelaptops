<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00a8ff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#07071a" stroke="url(#grad)" stroke-width="2"/>
  <!-- Laptop screen body -->
  <rect x="20" y="28" width="80" height="50" rx="5" fill="none" stroke="url(#grad)" stroke-width="2"/>
  <!-- Screen inner -->
  <rect x="28" y="35" width="64" height="36" rx="3" fill="rgba(0,168,255,0.06)" stroke="#00a8ff" stroke-width="1" opacity="0.7"/>
  <!-- Circuit lines inside screen -->
  <line x1="38" y1="48" x2="52" y2="48" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="48" x2="52" y2="40" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="48" x2="52" y2="48" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="48" x2="60" y2="60" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="60" x2="60" y2="60" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="48" x2="60" y2="48" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="48" x2="82" y2="40" stroke="#00a8ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Circuit nodes -->
  <circle cx="38" cy="48" r="2.5" fill="#00a8ff"/>
  <circle cx="52" cy="48" r="2.5" fill="#00a8ff"/>
  <circle cx="52" cy="40" r="2.5" fill="#00d4ff"/>
  <circle cx="60" cy="48" r="2.5" fill="#00a8ff"/>
  <circle cx="60" cy="60" r="2.5" fill="#00d4ff"/>
  <circle cx="48" cy="60" r="2.5" fill="#00a8ff"/>
  <circle cx="82" cy="48" r="2.5" fill="#00a8ff"/>
  <circle cx="82" cy="40" r="2.5" fill="#00d4ff"/>
  <!-- Laptop base -->
  <rect x="14" y="78" width="92" height="8" rx="4" fill="none" stroke="url(#grad)" stroke-width="2"/>
  <!-- Hinge indicator -->
  <line x1="54" y1="78" x2="66" y2="78" stroke="#00a8ff" stroke-width="1.5" opacity="0.5"/>
</svg>