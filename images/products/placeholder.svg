<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <rect width="400" height="280" fill="#0a0f2e"/>
  <rect x="1" y="1" width="398" height="278" fill="none" stroke="rgba(0,168,255,0.2)" stroke-width="1" rx="4"/>
  <!-- Screen -->
  <rect x="100" y="50" width="200" height="130" rx="6" fill="none" stroke="rgba(0,168,255,0.4)" stroke-width="2"/>
  <rect x="108" y="58" width="184" height="114" rx="3" fill="rgba(0,168,255,0.05)"/>
  <!-- Screen lines -->
  <line x1="120" y1="80" x2="280" y2="80" stroke="rgba(0,168,255,0.2)" stroke-width="1"/>
  <line x1="120" y1="96" x2="260" y2="96" stroke="rgba(0,168,255,0.15)" stroke-width="1"/>
  <line x1="120" y1="112" x2="240" y2="112" stroke="rgba(0,168,255,0.1)" stroke-width="1"/>
  <!-- Laptop body -->
  <rect x="80" y="180" width="240" height="14" rx="3" fill="rgba(0,168,255,0.15)" stroke="rgba(0,168,255,0.3)" stroke-width="1"/>
  <!-- Hinge -->
  <rect x="185" y="178" width="30" height="4" rx="2" fill="rgba(0,168,255,0.25)"/>
  <!-- Touchpad -->
  <rect x="165" y="188" width="70" height="0" rx="2" fill="none"/>
  <!-- Logo icon in center of screen -->
  <circle cx="200" cy="115" r="22" fill="none" stroke="rgba(0,168,255,0.35)" stroke-width="1.5"/>
  <text x="200" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="rgba(0,168,255,0.6)">NLL</text>
  <!-- Text below -->
  <text x="200" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,168,255,0.4)" letter-spacing="2">PRODUCT IMAGE</text>
  <text x="200" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,168,255,0.25)" letter-spacing="1">COMING SOON</text>
</svg>
